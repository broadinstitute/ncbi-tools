name: Build and Push Docker Image

on:
  push:
    branches:
      - '**'
    tags:
      - '**'
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday scan for new CVEs
  workflow_dispatch:

env:
  GHCR_REGISTRY: ghcr.io
  GHCR_IMAGE_NAME: ${{ github.repository }}

  # Optional additional registry (e.g., quay.io)
  # Configure via repository variables and secrets:
  #   Variables: REGISTRY, IMAGE_NAME
  #   Secrets: REGISTRY_USERNAME, REGISTRY_PASSWORD
  CUSTOM_REGISTRY: ${{ vars.REGISTRY || '' }}
  CUSTOM_IMAGE_NAME: ${{ vars.IMAGE_NAME || '' }}
  HAS_CUSTOM_REGISTRY: ${{ secrets.REGISTRY_USERNAME != '' }}

jobs:
  build:
    # Skip build on schedule and manual dispatch — only scan existing images
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.first-tag.outputs.tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to custom registry
        if: github.event_name != 'pull_request' && env.HAS_CUSTOM_REGISTRY == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.CUSTOM_REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata (tags, labels) for GHCR
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Extract metadata (tags, labels) for custom registry
        id: meta-custom
        if: env.HAS_CUSTOM_REGISTRY == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.CUSTOM_REGISTRY }}/${{ env.CUSTOM_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=ref,event=pr
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Combine tags
        id: all-tags
        run: |
          GHCR_TAGS="${{ steps.meta-ghcr.outputs.tags }}"
          CUSTOM_TAGS="${{ steps.meta-custom.outputs.tags }}"
          if [ -n "$CUSTOM_TAGS" ]; then
            ALL_TAGS=$(printf "%s\n%s" "$GHCR_TAGS" "$CUSTOM_TAGS")
          else
            ALL_TAGS="$GHCR_TAGS"
          fi
          # Use delimiter for multiline output
          echo "tags<<TAGS_EOF" >> "$GITHUB_OUTPUT"
          echo "$ALL_TAGS" >> "$GITHUB_OUTPUT"
          echo "TAGS_EOF" >> "$GITHUB_OUTPUT"

      - name: Extract first tag for scan job
        id: first-tag
        run: |
          FIRST_TAG=$(echo "${{ steps.meta-ghcr.outputs.tags }}" | head -n1)
          echo "tag=$FIRST_TAG" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.all-tags.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Run tests inside the built Docker image
  test:
    needs: build
    if: github.event_name != 'schedule' && github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image ref
        id: image-ref
        run: |
          echo "ref=${{ needs.build.outputs.image-tag }}" >> "$GITHUB_OUTPUT"

      - name: Pull image
        run: docker pull ${{ steps.image-ref.outputs.ref }}

      - name: Run pytest inside container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/tests:/work/tests" \
            ${{ steps.image-ref.outputs.ref }} \
            bash -c "cd /work && python -m pytest tests/ -v --tb=short"

  # Scan the pushed image for vulnerabilities
  scan:
    needs: build
    if: always() && (github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write
    steps:
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image ref
        id: image-ref
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "ref=${{ needs.build.outputs.image-tag }}" >> "$GITHUB_OUTPUT"
          else
            # Schedule or manual dispatch — scan the latest (main) image
            echo "ref=${{ env.GHCR_REGISTRY }}/${{ env.GHCR_IMAGE_NAME }}:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Pull image
        run: docker pull ${{ steps.image-ref.outputs.ref }}

      - name: Checkout (for ignore policy)
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (table)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.image-ref.outputs.ref }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: '0'
          ignore-unfixed: true
          ignore-policy: .trivy-ignore-policy.rego
          trivyignores: .trivyignore

      - name: Run Trivy vulnerability scanner (SARIF)
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: ${{ steps.image-ref.outputs.ref }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          limit-severities-for-sarif: true
          ignore-unfixed: true
          ignore-policy: .trivy-ignore-policy.rego
          trivyignores: .trivyignore

      - name: Log scan result count
        if: always()
        run: |
          if [ -f trivy-results.sarif ]; then
            COUNT=$(jq '[.runs[].results[]] | length' trivy-results.sarif)
            echo "::notice::Trivy found $COUNT findings (after policy filtering)"
          fi

      - name: Upload results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
